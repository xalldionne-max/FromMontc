<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>From Montc 🤍</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="opening">
    <h1>🤍</h1>
    <h2>For Someone Special</h2>
    <button id="openBtn">Open Letter</button>
</div>

<div id="mainContent" style="display:none;">

    <audio id="bgMusic" loop>
        <source src="music/music.mp3" type="audio/mpeg">
    </audio>

    <div class="hearts"></div>

    <section class="hero">

        <h1>To My Favorite Person</h1>

        <p>
            Thank you for staying with me.
            This little website is made especially for you.
        </p>

        <button id="musicBtn">
            🎵 Pause Music
        </button>

        <button id="memoryBtn">
            📷 Our Memories
        </button>

    </section>

    <section id="memories">

        <h2>Our Memories</h2>

        <div class="slider">

            <img class="slide active" src="images/1.jpg">

            <img class="slide" src="images/2.jpg">

            <img class="slide" src="images/3.jpg">

            <img class="slide" src="images/4.jpg">

            <img class="slide" src="images/5.jpg">

        </div>

        <div class="dots">

            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>

        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
